name: Deploy frontend to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site
          cp -R frontend/. site/
          touch site/.nojekyll

          # Inject backend URL at deploy time (configure in repo Settings -> Secrets and variables -> Actions -> Variables).
          BACKEND_URL="${BACKEND_URL:-}"
          BACKEND_URL="${BACKEND_URL%/}"
          if [ -n "$BACKEND_URL" ]; then
            python -c "import json,os; print('window.APP_CONFIG = { API_BASE: %s };' % json.dumps(os.environ['BACKEND_URL'].rstrip('/')))" > site/config.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

env:
  BACKEND_URL: ${{ vars.BACKEND_URL }}

